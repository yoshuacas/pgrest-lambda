services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pgrest_test
      POSTGRES_PASSWORD: pgrest_test
      POSTGRES_DB: pgrest_test
    ports:
      - "${PGREST_TEST_PG_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgrest_test -d pgrest_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
